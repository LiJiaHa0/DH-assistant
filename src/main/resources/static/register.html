<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - DH Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .register-container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }

        .register-container h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .register-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            color: #333;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .form-group .hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 6px;
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            background: #e8e8e8;
            overflow: hidden;
        }

        .password-strength .bar {
            height: 100%;
            width: 0;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .btn-register:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
            color: #bbb;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e8e8e8;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, transform 0.2s;
            letter-spacing: 1px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-login:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .message {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #e74c3c;
            min-height: 20px;
        }

        .message.success {
            color: #27ae60;
        }

        .agree-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #666;
        }

        .agree-row input[type="checkbox"] {
            accent-color: #667eea;
            width: 15px;
            height: 15px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .agree-row a {
            color: #667eea;
            text-decoration: none;
        }

        .agree-row a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>创建账号</h1>
        <p class="subtitle">注册你的 DH Assistant 账号</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入手机号" required autocomplete="tel" maxlength="11">
                <p class="hint">中国大陆 11 位手机号</p>
            </div>

            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" placeholder="请输入姓名" required>
            </div>

            <div class="form-group">
                <label for="nickname">昵称 <span style="color:#aaa;font-weight:normal">（选填）</span></label>
                <input type="text" id="nickname" name="nickname" placeholder="请输入昵称，不填则默认使用姓名">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="new-password">
                <div class="password-strength">
                    <div class="bar" id="strengthBar"></div>
                </div>
                <p class="hint" id="strengthText">至少 6 个字符</p>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required autocomplete="new-password">
            </div>

            <div class="agree-row">
                <input type="checkbox" id="agree" required>
                <label for="agree">我已阅读并同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a></label>
            </div>

            <button type="submit" class="btn-register" id="submitBtn">注 册</button>
        </form>

        <p class="message" id="message"></p>

        <div class="divider">已有账号？</div>

        <a href="login.html" class="btn-login">返回登录</a>
    </div>

    <script>
        // 密码强度检测
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', function () {
            const val = this.value;
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { width: '0%', color: '#e8e8e8', text: '至少 6 个字符' },
                { width: '20%', color: '#e74c3c', text: '非常弱' },
                { width: '40%', color: '#e67e22', text: '较弱' },
                { width: '60%', color: '#f1c40f', text: '一般' },
                { width: '80%', color: '#2ecc71', text: '较强' },
                { width: '100%', color: '#27ae60', text: '非常强' }
            ];

            const level = val.length === 0 ? levels[0] : levels[Math.min(score, 5)];
            strengthBar.style.width = level.width;
            strengthBar.style.background = level.color;
            strengthText.textContent = level.text;
            strengthText.style.color = level.color === '#e8e8e8' ? '#aaa' : level.color;
        });

        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const name = document.getElementById('name').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agree = document.getElementById('agree').checked;
            const msgEl = document.getElementById('message');

            // 前端校验
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                msgEl.className = 'message';
                msgEl.textContent = '手机号格式不正确';
                return;
            }

            if (!name) {
                msgEl.className = 'message';
                msgEl.textContent = '请输入姓名';
                return;
            }

            if (password.length < 6) {
                msgEl.className = 'message';
                msgEl.textContent = '密码长度不能少于 6 个字符';
                return;
            }

            if (password !== confirmPassword) {
                msgEl.className = 'message';
                msgEl.textContent = '两次输入的密码不一致';
                return;
            }

            if (!agree) {
                msgEl.className = 'message';
                msgEl.textContent = '请先同意服务条款和隐私政策';
                return;
            }

            fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password, name, nickname: nickname || undefined })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    msgEl.className = 'message success';
                    msgEl.textContent = data.msg || '注册成功！正在跳转到登录页...';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1200);
                } else {
                    msgEl.className = 'message';
                    msgEl.textContent = data.msg || '注册失败，请稍后重试';
                }
            })
            .catch(() => {
                msgEl.className = 'message';
                msgEl.textContent = '网络错误，请稍后重试';
            });
        });
    </script>
</body>
</html>
