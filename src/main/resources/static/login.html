<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - DH Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }

        .login-container h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            color: #333;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            accent-color: #667eea;
            width: 15px;
            height: 15px;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 28px 0;
            position: relative;
            color: #bbb;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e8e8e8;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, transform 0.2s;
            letter-spacing: 1px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-register:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .message {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #e74c3c;
            min-height: 20px;
        }

        .message.success {
            color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>欢迎回来</h1>
        <p class="subtitle">请登录你的 DH Assistant 账号</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入手机号" required autocomplete="tel" maxlength="11">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>

            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> 记住我
                </label>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>

            <button type="submit" class="btn-login">登 录</button>
        </form>

        <p class="message" id="message"></p>

        <div class="divider">还没有账号？</div>

        <a href="register.html" class="btn-register">立即注册</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const msgEl = document.getElementById('message');

            if (!phone || !password) {
                msgEl.className = 'message';
                msgEl.textContent = '请填写手机号和密码';
                return;
            }

            // 校验手机号格式
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                msgEl.className = 'message';
                msgEl.textContent = '手机号格式不正确';
                return;
            }

            fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    msgEl.className = 'message success';
                    msgEl.textContent = data.msg || '登录成功，正在跳转...';
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 800);
                } else {
                    msgEl.className = 'message';
                    msgEl.textContent = data.msg || '登录失败';
                }
            })
            .catch(() => {
                msgEl.className = 'message';
                msgEl.textContent = '网络错误，请稍后重试';
            });
        });
    </script>
</body>
</html>
